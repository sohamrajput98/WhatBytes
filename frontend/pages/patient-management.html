<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Serenity - Patient Management</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../assets/js/theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="../assets/css/base.css" rel="stylesheet" />
  <link href="../assets/css/app.css" rel="stylesheet" />
</head>
<body data-page="patients" class="font-body text-on-surface antialiased">
  <div class="app-shell flex min-h-screen">
    <div data-sidebar></div>
    <main class="flex-1 p-6 md:p-8 space-y-6 pb-24 md:pb-8">
      <section class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
          <h1 class="text-3xl md:text-4xl font-black">Patient Registry</h1>
          <p class="text-on-surface-variant">Create, update, and manage patient records tied to your account.</p>
        </div>
        <button id="openPatientModal" class="btn-primary">Add Patient</button>
      </section>

      <section class="panel p-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <input id="patientSearch" class="field md:col-span-2" placeholder="Search patient by name, gender, contact..." />
          <select id="genderFilter" class="field">
            <option value="">All Genders</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
      </section>

      <section class="panel p-4">
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Name</th><th>Age</th><th>Gender</th><th>Contact</th><th>Address</th><th>Medical History</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="patientsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <div data-mobile-nav></div>

  <div id="patientModal" class="modal-backdrop">
    <div class="modal-card">
      <div class="flex items-center justify-between mb-4">
        <h2 id="patientModalTitle" class="text-xl font-bold">Add Patient</h2>
        <button id="closePatientModal" class="btn-secondary">Close</button>
      </div>
      <form id="patientForm" class="space-y-3">
        <input type="hidden" name="patient_id" />
        <label class="block"><span class="text-sm text-on-surface-variant">Name</span><input name="name" class="field mt-1" required /></label>
        <div class="grid grid-cols-2 gap-3">
          <label class="block"><span class="text-sm text-on-surface-variant">Age</span><input name="age" type="number" min="0" class="field mt-1" required /></label>
          <label class="block"><span class="text-sm text-on-surface-variant">Gender</span>
            <select name="gender" class="field mt-1" required>
              <option value="male">Male</option><option value="female">Female</option><option value="other">Other</option>
            </select>
          </label>
        </div>
        <label class="block"><span class="text-sm text-on-surface-variant">Contact Number</span><input name="contact_number" class="field mt-1" required /></label>
        <label class="block"><span class="text-sm text-on-surface-variant">Address</span><input name="address" class="field mt-1" required /></label>
        <label class="block"><span class="text-sm text-on-surface-variant">Medical History</span><textarea name="medical_history" class="field mt-1" rows="3"></textarea></label>
        <button class="btn-primary w-full" type="submit">Save Patient</button>
      </form>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/patients.js"></script>
</body>
</html>
